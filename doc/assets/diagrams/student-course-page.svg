<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Student dashboard">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="720" height="200" fill="#FFFFFF"/>
  
    <g transform="translate(60,55) scale(1.2)">
      <rect x="7" y="24" width="18" height="18" rx="5" fill="#5B8DEF"/>
      <circle cx="16" cy="14" r="8" fill="#F2C9A0"/>
      <rect x="22" y="26" width="10" height="14" rx="2" fill="#F4B942"/>
    </g>
    <rect x="40" y="30" width="200" height="40" rx="10" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="140.0" y="50.0"><tspan x="140.0" dy="0">Student portal (ages 7-13)</tspan></text>
    
    <rect x="300" y="60" width="120" height="55" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="360.0" y="87.5"><tspan x="360.0" dy="0">Today schedule</tspan></text>
    
    <rect x="440" y="60" width="120" height="55" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="500.0" y="87.5"><tspan x="500.0" dy="0">To-do work</tspan></text>
    
    <rect x="580" y="60" width="120" height="55" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="640.0" y="87.5"><tspan x="640.0" dy="0">Course pages</tspan></text>
    
    <line x1="240" y1="90" x2="295" y2="90" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <line x1="240" y1="90" x2="435" y2="90" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <line x1="240" y1="90" x2="575" y2="90" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
</svg>