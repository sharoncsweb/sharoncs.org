<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Login methods">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="720" height="200" fill="#FFFFFF"/>
  
    <g transform="translate(300,40) scale(1.1)">
      <rect x="6" y="22" width="20" height="22" rx="5" fill="#3D9B8A"/>
      <circle cx="16" cy="12" r="9" fill="#F2C9A0"/>
      <path d="M8 10 Q16 4 24 10" fill="#2C2C2C"/>
    </g>
    <rect x="250" y="25" width="220" height="35" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="360.0" y="42.5"><tspan x="360.0" dy="0">One user account</tspan></text>
    
    <rect x="50" y="100" width="115" height="45" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="107.5" y="122.5"><tspan x="107.5" dy="0">Google OAuth</tspan></text>
    
    <rect x="175" y="100" width="115" height="45" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="232.5" y="122.5"><tspan x="232.5" dy="0">Microsoft OAuth</tspan></text>
    
    <rect x="300" y="100" width="115" height="45" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="357.5" y="122.5"><tspan x="357.5" dy="0">Email + password</tspan></text>
    
    <rect x="425" y="100" width="115" height="45" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="482.5" y="122.5"><tspan x="482.5" dy="0">Phone + SMS</tspan></text>
    
    <line x1="350" y1="60" x2="107" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <line x1="350" y1="60" x2="232" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <line x1="350" y1="60" x2="357" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <line x1="350" y1="60" x2="482" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
</svg>