<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Registration flow">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="720" height="200" fill="#FFFFFF"/>
  
    <g transform="translate(40,60) scale(1)">
      <rect x="6" y="22" width="20" height="22" rx="5" fill="#3D9B8A"/>
      <circle cx="16" cy="12" r="9" fill="#F2C9A0"/>
      <path d="M8 10 Q16 4 24 10" fill="#2C2C2C"/>
    </g>
    <rect x="100" y="75" width="130" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="165.0" y="92.0"><tspan x="165.0" dy="0">Choose login</tspan><tspan x="165.0" dy="14">OAuth / email / SMS</tspan></text>
    
    <line x1="230" y1="100" x2="280" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <rect x="280" y="75" width="110" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="335.0" y="92.0"><tspan x="335.0" dy="0">Profile</tspan><tspan x="335.0" dy="14">(Self)</tspan></text>
    
    <line x1="390" y1="100" x2="440" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <rect x="440" y="75" width="110" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="495.0" y="100.0"><tspan x="495.0" dy="0">Add child</tspan></text>
    
    <line x1="550" y1="100" x2="600" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <rect x="600" y="75" width="100" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="650.0" y="100.0"><tspan x="650.0" dy="0">Enroll & pay</tspan></text>
    
    <g transform="translate(640,55) scale(0.85)">
      <rect x="8" y="26" width="16" height="15" rx="5" fill="#5B8DEF"/>
      <circle cx="16" cy="13" r="7" fill="#F2C9A0"/>
      <rect x="22" y="28" width="9" height="12" rx="2" fill="#F4B942"/>
    </g>
</svg>