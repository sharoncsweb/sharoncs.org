<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Enrollment and payment">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="720" height="200" fill="#FFFFFF"/>
  
    <g transform="translate(30,65) scale(1)">
      <rect x="6" y="22" width="20" height="22" rx="5" fill="#3D9B8A"/>
      <circle cx="16" cy="12" r="9" fill="#F2C9A0"/>
      <path d="M8 10 Q16 4 24 10" fill="#2C2C2C"/>
    </g>
    <rect x="100" y="75" width="90" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="145.0" y="100.0"><tspan x="145.0" dy="0">Pick student</tspan></text>
    
    <line x1="190" y1="100" x2="230" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <rect x="230" y="75" width="90" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="275.0" y="100.0"><tspan x="275.0" dy="0">Add classes</tspan></text>
    
    <line x1="320" y1="100" x2="360" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <rect x="360" y="75" width="80" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="400.0" y="100.0"><tspan x="400.0" dy="0">Cart</tspan></text>
    
    <line x1="440" y1="100" x2="480" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <rect x="480" y="75" width="90" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="525.0" y="100.0"><tspan x="525.0" dy="0">Discounts</tspan></text>
    
    <line x1="570" y1="100" x2="610" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <rect x="610" y="75" width="90" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="655.0" y="100.0"><tspan x="655.0" dy="0">Pay</tspan></text>
    
</svg>