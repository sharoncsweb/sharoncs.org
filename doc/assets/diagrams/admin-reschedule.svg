<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Reschedule one session">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="720" height="200" fill="#FFFFFF"/>
  
    <rect x="60" y="75" width="140" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="130.0" y="100.0"><tspan x="130.0" dy="0">Yearly schedule</tspan></text>
    
    <line x1="200" y1="100" x2="280" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <rect x="280" y="75" width="120" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="340.0" y="100.0"><tspan x="340.0" dy="0">One conflict</tspan></text>
    
    <line x1="400" y1="100" x2="480" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <rect x="480" y="75" width="180" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="570.0" y="100.0"><tspan x="570.0" dy="0">Move session or substitute</tspan></text>
    
</svg>