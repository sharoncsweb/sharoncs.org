<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Volunteer duty reminder">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="720" height="200" fill="#FFFFFF"/>
  
    <g transform="translate(60,60) scale(1)">
      <rect x="6" y="22" width="20" height="22" rx="5" fill="#3D9B8A"/>
      <circle cx="16" cy="12" r="9" fill="#F2C9A0"/>
      <path d="M8 10 Q16 4 24 10" fill="#2C2C2C"/>
    </g>
    <rect x="40" y="130" width="120" height="40" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="100.0" y="150.0"><tspan x="100.0" dy="0">Duty scheduled</tspan></text>
    
    <line x1="160" y1="100" x2="280" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <rect x="280" y="75" width="140" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="350.0" y="100.0"><tspan x="350.0" dy="0">Reminder 3 days before</tspan></text>
    
    <line x1="420" y1="100" x2="520" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <rect x="520" y="75" width="140" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="590.0" y="100.0"><tspan x="590.0" dy="0">Shows up on duty</tspan></text>
    
</svg>