<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Course lifecycle">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="720" height="200" fill="#FFFFFF"/>
  
    <g transform="translate(50,65) scale(1)">
      <rect x="6" y="22" width="20" height="22" rx="5" fill="#5C6370"/>
      <circle cx="16" cy="12" r="9" fill="#F2C9A0"/>
      <rect x="11" y="26" width="10" height="12" rx="2" fill="#fff"/>
    </g>
    <rect x="30" y="140" width="100" height="35" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="80.0" y="157.5"><tspan x="80.0" dy="0">Define course</tspan></text>
    
    <line x1="130" y1="100" x2="200" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <g transform="translate(200,65) scale(1)">
      <rect x="5" y="22" width="22" height="22" rx="5" fill="#6B5CE7"/>
      <circle cx="16" cy="12" r="9" fill="#F2C9A0"/>
      <rect x="24" y="16" width="10" height="3" rx="1" fill="#fff"/>
    </g>
    <rect x="180" y="140" width="110" height="35" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="235.0" y="157.5"><tspan x="235.0" dy="0">Upload content</tspan></text>
    
    <line x1="290" y1="100" x2="380" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>
    
    <g transform="translate(380,70) scale(1)">
      <rect x="7" y="24" width="18" height="18" rx="5" fill="#5B8DEF"/>
      <circle cx="16" cy="14" r="8" fill="#F2C9A0"/>
      <rect x="22" y="26" width="10" height="14" rx="2" fill="#F4B942"/>
    </g>
    <rect x="360" y="140" width="110" height="35" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#334155" x="415.0" y="157.5"><tspan x="415.0" dy="0">Learn & submit</tspan></text>
    
</svg>